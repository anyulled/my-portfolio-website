name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # Uncomment this line to enable task distribution
      # - run: npx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="build"

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm ci --legacy-peer-deps

      - run: npm run lint
      - run: npm run test
      - run: npm run build

  scorecard:
    runs-on: ubuntu-latest
    name: AI Hardness Scorecard
    if: github.event_name != 'pull_request'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: markmishaev76/ai-harness-scorecard@v1
        id: scorecard

      - name: Commit badge and report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp scorecard-badge.json /tmp/scorecard-badge.json
          cp scorecard-report.md /tmp/scorecard-report.md
          rm -f scorecard-badge.json scorecard-report.md
          git fetch origin scorecard
          git checkout scorecard
          cp /tmp/scorecard-badge.json scorecard-badge.json
          cp /tmp/scorecard-report.md scorecard-report.md
          git add scorecard-badge.json scorecard-report.md
          git diff --cached --quiet || git commit -m "chore: update scorecard badge and report"
          git push origin scorecard
